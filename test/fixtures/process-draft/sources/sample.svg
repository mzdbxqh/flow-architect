<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>采购审批流程</title>
  <rect x="10" y="10" width="100" height="40" rx="5" fill="#4CAF50" stroke="#333"/>
  <text x="60" y="35" text-anchor="middle" fill="white" font-size="14">开始</text>

  <rect x="150" y="10" width="100" height="40" rx="5" fill="#2196F3" stroke="#333"/>
  <text x="200" y="35" text-anchor="middle" fill="white" font-size="14">审批</text>

  <rect x="290" y="10" width="100" height="40" rx="5" fill="#f44336" stroke="#333"/>
  <text x="340" y="35" text-anchor="middle" fill="white" font-size="14">结束</text>

  <line x1="110" y1="30" x2="150" y2="30" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="30" x2="290" y2="30" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>
